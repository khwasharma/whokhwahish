name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: khwasharma  
  IMAGE_NAME: whokhwahish-static

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Validate HTML
  # ─────────────────────────────────────────
  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .

  # ─────────────────────────────────────────
  # JOB 2 — Build, Smoke Test, Scan, Push
  # ─────────────────────────────────────────
  build-test-push:
    name: Build, Test, Scan & Push
    runs-on: ubuntu-latest
    needs: validate-html        # only runs if HTML validation passes
 
    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # 2. Set short commit SHA as image tag
      - name: Set image tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
 
      # 3. Build Docker image (don't push yet — test first)
      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }} .
          docker tag ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }} \
                     ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
 
      # 4. Smoke test — start container, hit it with curl
      - name: Smoke test container
        run: |
          docker run -d -p 8080:80 --name smoke-test \
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          echo "Waiting for container to be ready..."
          sleep 5
          echo "Hitting http://localhost:8080 ..."
          curl --fail --retry 3 --retry-delay 2 http://localhost:8080 || \
            (echo "❌ Smoke test failed — container did not respond" && exit 1)
          echo "✅ Smoke test passed"
          docker stop smoke-test && docker rm smoke-test
 
      # 5. Trivy — scan image for HIGH and CRITICAL CVEs
      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          severity: CRITICAL,HIGH
          exit-code: 0           # fails the pipeline if vulnerabilities found
          ignore-unfixed: true   # skip CVEs with no fix available yet
          format: table
 
      # 6. Broken link check on index.html
      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress index.html
          fail: true             # fails pipeline if broken links found
 
      # 7. Log in to Docker Hub — only after all tests pass
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      # 8. Push image — only on merge to main, not on PRs
      - name: 🐳 Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
